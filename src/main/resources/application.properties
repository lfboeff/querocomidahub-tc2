spring.application.name=querocomidahub
server.port=8080

# Datasource
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/querocomidahub_db?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER_NAME:fiapdbuser}
spring.datasource.password=${DB_USER_PASSWORD:fiapdbuserpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=querocomidahub_db

# JDBC Logging (for local development only)
#logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
#logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE

# Actuator
management.server.port=9090
management.endpoints.web.exposure.include=health,flyway,metrics
management.endpoint.health.show-details=always

# Shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
